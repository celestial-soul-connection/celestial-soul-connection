<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#2A1E54"/>
      <stop offset="55%" stop-color="#140E33"/>
      <stop offset="100%" stop-color="#0B0820"/>
    </radialGradient>
    <!-- EXACT gradients from mockups-merge.html concept #2 (The Eternal Knot) -->
    <linearGradient id="g2a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B79CFF"/><stop offset="1" stop-color="#E7C766"/>
    </linearGradient>
    <linearGradient id="g2b" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E985B0"/><stop offset="1" stop-color="#E7C766"/>
    </linearGradient>
    <radialGradient id="bloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF3C8" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#E7C766" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E7C766" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- stardust -->
  <g fill="#FFFFFF">
    <circle cx="180" cy="230" r="3" opacity="0.55"/>
    <circle cx="844" cy="250" r="2.5" opacity="0.5"/>
    <circle cx="250" cy="800" r="2.5" opacity="0.45"/>
    <circle cx="812" cy="792" r="3" opacity="0.5"/>
    <circle cx="150" cy="560" r="2" opacity="0.4"/>
    <circle cx="884" cy="600" r="2" opacity="0.45"/>
  </g>

  <!--
    The Eternal Knot, taken verbatim from design/mockups-merge.html (concept #2).
    Mockup artwork is a 240x240 viewBox. We scale it ~3.3x and center it on the
    1024 tile: translate to center the 240 box, then scale. Threads thickened
    (stroke-width 9 in mockup units) so the form survives at small icon sizes.
    The two paths converge at (120,170) and pass through ~(120,120) — the bloom.
  -->
  <g transform="translate(116 96) scale(3.3)">
    <!-- gold bloom at the knot's convergence (mockup .knotglow ~center) -->
    <circle cx="120" cy="120" r="34" fill="url(#bloom)"/>
    <g fill="none" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)">
      <path stroke="url(#g2a)" d="M70,30 C160,70 80,140 120,170 C150,192 180,150 150,120 C120,92 70,150 120,200"/>
      <path stroke="url(#g2b)" d="M170,30 C80,70 160,140 120,170 C90,192 60,150 90,120 C120,92 170,150 120,200"/>
    </g>
  </g>
</svg>
