<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g2a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B79CFF"/><stop offset="1" stop-color="#E7C766"/>
    </linearGradient>
    <linearGradient id="g2b" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E985B0"/><stop offset="1" stop-color="#E7C766"/>
    </linearGradient>
    <radialGradient id="bloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF3C8" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#E7C766" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E7C766" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Transparent background. Knot scaled SMALLER so it sits inside the Android
       adaptive safe zone (center ~66%); the system mask crops the outer ring. -->
  <g transform="translate(216 196) scale(2.42)">
    <circle cx="120" cy="120" r="34" fill="url(#bloom)"/>
    <g fill="none" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)">
      <path stroke="url(#g2a)" d="M70,30 C160,70 80,140 120,170 C150,192 180,150 150,120 C120,92 70,150 120,200"/>
      <path stroke="url(#g2b)" d="M170,30 C80,70 160,140 120,170 C90,192 60,150 90,120 C120,92 170,150 120,200"/>
    </g>
  </g>
</svg>
