<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Celestial — Soul-Merge Concepts</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400..600;1,400..600&family=Instrument+Serif:ital@0;1&family=Outfit:wght@200..600&display=swap" rel="stylesheet" />
<style>
:root{
  --bg0:#070414;--ink:#F3EEFF;--muted:#A89BD0;--faint:#695E92;
  --gold:#E7C766;--violet:#A98BFF;--rose:#E985B0;--teal:#62E6D0;
  --grad:linear-gradient(135deg,#B79CFF,#7E5FD6 55%,#4B2FA0);
  --glass:rgba(26,18,54,.46);--line:rgba(168,150,255,.20);
  --display:'Cormorant Garamond',serif;--body:'Outfit';
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
body{background:#040210;color:#e8e3f5;font-family:var(--body);overflow-x:hidden;}
.bar{position:sticky;top:0;z-index:300;background:rgba(7,4,16,.9);backdrop-filter:blur(16px);border-bottom:1px solid #1a1430;padding:16px 24px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
.bar h1{font-family:'Instrument Serif',serif;font-size:21px;}
.bar .hint{margin-left:auto;color:#6a6088;font-size:12px;}
.intro{text-align:center;padding:44px 24px 8px;}
.intro h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:32px;background:linear-gradient(120deg,#fff,#B79CFF,#E7C766);-webkit-background-clip:text;background-clip:text;color:transparent;}
.intro p{color:#8a82a8;margin-top:10px;font-size:14px;max-width:620px;margin-inline:auto;line-height:1.6;}
.stage{display:flex;flex-wrap:wrap;gap:46px 40px;justify-content:center;padding:42px 24px 110px;perspective:2000px;}
.col{display:flex;flex-direction:column;align-items:center;gap:14px;max-width:330px;}
.cap{font-family:var(--display);font-size:20px;color:var(--gold);}
.subcap{font-size:12px;color:#8a82a8;text-align:center;line-height:1.5;margin-top:-6px;}
.phone{width:312px;height:660px;border-radius:52px;padding:12px;position:relative;background:linear-gradient(155deg,#241c3e,#0a0718);
  box-shadow:0 40px 90px rgba(40,20,90,.4),0 18px 44px rgba(0,0,0,.6),inset 0 0 0 1px rgba(183,156,255,.14);
  transform-style:preserve-3d;transition:transform .3s cubic-bezier(.2,.7,.2,1);}
.screen{position:relative;width:100%;height:100%;border-radius:40px;overflow:hidden;background:var(--bg0);}
.notch{position:absolute;top:13px;left:50%;transform:translateX(-50%);width:100px;height:22px;background:#040210;border-radius:14px;z-index:90;}
.sky{position:absolute;inset:0;overflow:hidden;}
.neb{position:absolute;border-radius:50%;filter:blur(54px);mix-blend-mode:screen;animation:breathe 9s ease-in-out infinite;}
.neb.v{width:78%;height:56%;background:#6E4FE0;top:-10%;left:-14%;}
.neb.r{width:62%;height:50%;background:#C0407A;bottom:4%;right:-16%;animation-delay:2.5s;}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.5;}50%{transform:scale(1.18);opacity:.8;}}
.fixed{position:absolute;inset:0;background-image:radial-gradient(1.4px 1.4px at 15% 20%,#fff,transparent),radial-gradient(1.2px 1.2px at 65% 12%,#fff,transparent),radial-gradient(1.5px 1.5px at 82% 32%,#fff,transparent),radial-gradient(1px 1px at 38% 46%,#fff,transparent),radial-gradient(1.3px 1.3px at 25% 72%,#fff,transparent),radial-gradient(1px 1px at 88% 66%,#fff,transparent);animation:twk 5s ease-in-out infinite alternate;}
@keyframes twk{from{opacity:.35;}to{opacity:.8;}}
.veil{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,4,20,.4),transparent 30%,transparent 60%,var(--bg0) 96%);}
.ui{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;padding:54px 24px 26px;}
.eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--faint);}
.serif{font-family:var(--display);line-height:1.04;letter-spacing:.2px;}
.muted{color:var(--muted);}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;border-radius:999px;background:var(--grad);color:#fff;font-weight:500;font-size:15px;border:none;cursor:pointer;box-shadow:0 14px 36px -10px var(--violet);}
.replay{margin-top:10px;align-self:center;font-size:12px;color:var(--gold);cursor:pointer;border:1px solid var(--line);padding:7px 16px;border-radius:999px;background:rgba(255,255,255,.04);}
.replay:hover{background:rgba(255,255,255,.1);}
.scene{position:relative;width:240px;height:240px;margin:0 auto;}

/* ============ CONCEPT 1 · TWO LIGHTS BECOME ONE ============ */
/* two orbs spiral inward, collide → flash → bloom into one star. 6s, then holds. */
.c1 .orbL,.c1 .orbR{position:absolute;top:50%;left:50%;width:40px;height:40px;border-radius:50%;margin:-20px;}
.c1 .orbL{background:radial-gradient(circle at 35% 35%,#D9C7FF,#7E5FD6);box-shadow:0 0 30px 4px #8E6FD0;animation:c1L 6s cubic-bezier(.5,0,.4,1) forwards;}
.c1 .orbR{background:radial-gradient(circle at 35% 35%,#FFD0E4,#C0407A);box-shadow:0 0 30px 4px #E985B0;animation:c1R 6s cubic-bezier(.5,0,.4,1) forwards;}
@keyframes c1L{0%{transform:translate(-150px,-40px) scale(.7);opacity:0;}15%{opacity:1;}55%{transform:rotate(-220deg) translateX(46px) scale(1);}80%,100%{transform:translate(0,0) scale(0);opacity:0;}}
@keyframes c1R{0%{transform:translate(150px,40px) scale(.7);opacity:0;}15%{opacity:1;}55%{transform:rotate(-40deg) translateX(46px) scale(1);}80%,100%{transform:translate(0,0) scale(0);opacity:0;}}
.c1 .flash{position:absolute;top:50%;left:50%;width:10px;height:10px;margin:-5px;border-radius:50%;background:#fff;opacity:0;animation:c1flash 6s ease-out forwards;}
@keyframes c1flash{0%,72%{opacity:0;transform:scale(0);}78%{opacity:1;transform:scale(9);box-shadow:0 0 60px 30px #fff;}100%{opacity:0;transform:scale(14);}}
.c1 .star{position:absolute;top:50%;left:50%;width:64px;height:64px;margin:-32px;border-radius:50%;opacity:0;
  background:radial-gradient(circle at 40% 35%,#fff,var(--gold) 55%,#C99A2A);box-shadow:0 0 50px 10px var(--gold);animation:c1star 6s cubic-bezier(.2,.7,.2,1) forwards;}
@keyframes c1star{0%,76%{opacity:0;transform:scale(0);}86%{opacity:1;transform:scale(1.1);}100%{opacity:1;transform:scale(1);}}
.c1 .halo{position:absolute;top:50%;left:50%;width:64px;height:64px;margin:-32px;border-radius:50%;border:1px solid var(--gold);opacity:0;animation:c1halo 6s ease-out forwards;}
@keyframes c1halo{0%,80%{opacity:0;transform:scale(1);}88%{opacity:.7;}100%{opacity:0;transform:scale(3.2);}}

/* ============ CONCEPT 2 · ETERNAL KNOT (threads of fate) ============ */
.c2 svg{position:absolute;inset:0;}
.c2 path{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-dasharray:520;stroke-dashoffset:520;animation:draw2 5s cubic-bezier(.4,0,.2,1) forwards;}
.c2 .p1{stroke:url(#g2a);}.c2 .p2{stroke:url(#g2b);animation-delay:.4s;}
@keyframes draw2{to{stroke-dashoffset:0;}}
.c2 .knotglow{position:absolute;top:50%;left:50%;width:30px;height:30px;margin:-15px;border-radius:50%;background:var(--gold);filter:blur(8px);opacity:0;animation:knot 5s ease-out forwards;}
@keyframes knot{0%,75%{opacity:0;transform:scale(.4);}90%{opacity:.9;transform:scale(1.3);}100%{opacity:.6;transform:scale(1);}}

/* ============ CONCEPT 3 · CONFLUENCE (rivers of stardust merge) ============ */
.c3 .river{position:absolute;top:50%;width:120px;height:3px;border-radius:3px;}
.c3 .rl{left:-6px;background:linear-gradient(90deg,transparent,var(--violet));animation:rl 5s ease-in forwards;transform-origin:left;}
.c3 .rr{right:-6px;background:linear-gradient(270deg,transparent,var(--rose));animation:rr 5s ease-in forwards;transform-origin:right;}
@keyframes rl{0%{transform:scaleX(0);}55%{transform:scaleX(1);}100%{transform:scaleX(1);}}
@keyframes rr{0%{transform:scaleX(0);}55%{transform:scaleX(1);}100%{transform:scaleX(1);}}
.c3 .rise-col{position:absolute;left:50%;bottom:50%;width:3px;margin-left:-1.5px;height:0;background:linear-gradient(to top,var(--gold),transparent);animation:rcol 5s ease-out forwards;}
@keyframes rcol{0%,52%{height:0;}80%{height:90px;}100%{height:80px;}}
.c3 .conf-star{position:absolute;left:50%;top:50%;width:48px;height:48px;margin:-24px;border-radius:50%;opacity:0;
  background:radial-gradient(circle at 40% 35%,#fff,var(--gold) 60%,#C99A2A);box-shadow:0 0 44px 8px var(--gold);animation:cstar 5s ease-out forwards;}
@keyframes cstar{0%,55%{opacity:0;transform:scale(0);}75%{opacity:1;transform:scale(1.15);}100%{opacity:1;transform:scale(1);}}
.c3 .drop{position:absolute;top:calc(50% - 1px);width:5px;height:5px;border-radius:50%;background:#fff;box-shadow:0 0 6px #fff;}
.c3 .d1{animation:d1 5s linear infinite;}.c3 .d2{animation:d2 5s linear infinite .8s;}
@keyframes d1{0%{left:0;opacity:0;}10%{opacity:1;}48%{left:48%;opacity:1;}55%{opacity:0;}100%{opacity:0;}}
@keyframes d2{0%{right:0;left:auto;opacity:0;}10%{opacity:1;}48%{right:48%;opacity:1;}55%{opacity:0;}100%{opacity:0;}}

/* ============ CONCEPT 4 · ALIGNMENT (eclipse) ============ */
.c4 .body{position:absolute;top:50%;width:84px;height:84px;border-radius:50%;margin-top:-42px;}
.c4 .sun{left:50%;margin-left:-42px;background:radial-gradient(circle at 40% 40%,#FFE9A8,var(--gold) 60%,#B8881E);box-shadow:0 0 50px 8px var(--gold);animation:c4sun 5.5s cubic-bezier(.4,0,.2,1) forwards;}
.c4 .moon{left:50%;margin-left:-42px;background:radial-gradient(circle at 40% 40%,#CFC3F0,#7E5FD6 65%,#3A2A8E);box-shadow:0 0 40px 6px var(--violet);animation:c4moon 5.5s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes c4sun{0%{transform:translateX(-130px) scale(.85);opacity:0;}15%{opacity:1;}100%{transform:translateX(0) scale(1);}}
@keyframes c4moon{0%{transform:translateX(130px) scale(.85);opacity:0;}15%{opacity:1;}100%{transform:translateX(-6px) scale(.94);}}
.c4 .corona{position:absolute;top:50%;left:50%;width:96px;height:96px;margin:-48px;border-radius:50%;border:2px solid var(--gold);opacity:0;animation:corona 5.5s ease-out forwards;}
@keyframes corona{0%,80%{opacity:0;transform:scale(.9);}90%{opacity:.9;transform:scale(1.05);}100%{opacity:.55;transform:scale(1.12);box-shadow:0 0 40px var(--gold);}}

.cring{--p:88;width:120px;height:120px;border-radius:50%;display:grid;place-items:center;position:relative;background:conic-gradient(var(--gold) calc(var(--p)*1%),rgba(255,255,255,.08) 0);}
.cring::before{content:'';position:absolute;inset:10px;border-radius:50%;background:rgba(10,6,24,.7);}
.cring .v{position:relative;font-family:var(--display);font-size:38px;}
</style>
</head>
<body>
<div class="bar"><h1>Celestial · soul-merge concepts</h1><span class="hint">Each animation RESOLVES — it arrives, then holds. Tap “replay” to watch again.</span></div>
<div class="intro">
  <h2>Two becoming one — motion that completes</h2>
  <p>No endless spinning. Four metaphors for the moment two souls align — each plays out like a small ceremony, then settles. Which one moves you?</p>
</div>
<div class="stage" id="stage"></div>

<script>
function sky(){return `<div class="sky"><div class="neb v"></div><div class="neb r"></div><div class="fixed"></div><div class="veil"></div></div>`;}

const concepts=[
['Two Lights Become One','Two souls spiral inward, collide in a burst of light, and bloom into a single golden star.',
 `<div class="scene c1">
    <div class="orbL"></div><div class="orbR"></div>
    <div class="flash"></div><div class="halo"></div><div class="star"></div>
  </div>`],
['The Eternal Knot','Two luminous threads of fate weave from above and below and tie into one endless knot.',
 `<div class="scene c2">
    <svg viewBox="0 0 240 240"><defs>
      <linearGradient id="g2a" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#B79CFF"/><stop offset="1" stop-color="#E7C766"/></linearGradient>
      <linearGradient id="g2b" x1="1" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E985B0"/><stop offset="1" stop-color="#E7C766"/></linearGradient></defs>
      <path class="p1" d="M70,30 C160,70 80,140 120,170 C150,192 180,150 150,120 C120,92 70,150 120,200"/>
      <path class="p2" d="M170,30 C80,70 160,140 120,170 C90,192 60,150 90,120 C120,92 170,150 120,200"/>
    </svg><div class="knotglow"></div>
  </div>`],
['The Confluence','Two rivers of stardust flow toward each other, pour into one, and rise as a shared star.',
 `<div class="scene c3">
    <div class="river rl"></div><div class="river rr"></div>
    <div class="drop d1"></div><div class="drop d2"></div>
    <div class="rise-col"></div><div class="conf-star"></div>
  </div>`],
['The Alignment','A sun-soul and a moon-soul drift together and settle into a single luminous eclipse.',
 `<div class="scene c4">
    <div class="body sun"></div><div class="body moon"></div><div class="corona"></div>
  </div>`],
];

function card([title,desc,scene],i){
  return `<div class="col">
    <div class="cap">${i+1}. ${title}</div>
    <div class="phone"><div class="notch"></div><div class="screen">${sky()}
      <div class="ui">
        <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
          <div class="scene-wrap" data-i="${i}">${scene}</div>
          <div class="eyebrow" style="text-align:center;margin-top:20px">A mutual alignment</div>
          <div class="serif" style="font-size:38px;text-align:center;margin-top:10px">Your souls<br><i style="color:var(--gold)">have aligned.</i></div>
          <p class="muted" style="font-size:13.5px;text-align:center;line-height:1.6;margin-top:14px">You &amp; Aria — 88% aligned. Two secure hearts, shared values, room to grow.</p>
        </div>
        <button class="btn">Send the first soul probe</button>
        <div class="replay" onclick="replay(${i})">↻ Replay the merge</div>
      </div></div></div>
    <div class="subcap">${desc}</div>
  </div>`;
}
function replay(i){
  const w=document.querySelectorAll('.scene-wrap')[i];
  const clone=w.cloneNode(true); w.replaceWith(clone); // restart CSS animations
}
document.getElementById('stage').innerHTML = concepts.map(card).join('');
document.querySelectorAll('.phone').forEach(p=>{
  p.addEventListener('mousemove',e=>{const r=p.getBoundingClientRect();const x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;
    p.style.transform=`rotateY(${x*12}deg) rotateX(${-y*12}deg) translateZ(16px)`;});
  p.addEventListener('mouseleave',()=>p.style.transform='');
});
</script>
</body>
</html>
